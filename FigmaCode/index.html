<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FleetSense Login</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0A4BFF;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top, rgba(255,255,255,0.17), transparent 24%),
                        radial-gradient(circle at bottom right, rgba(255,255,255,0.08), transparent 20%),
                        linear-gradient(180deg, #005BFF 0%, #003FCC 100%);
            color: #111827;
        }

        .page {
            width: min(100%, 420px);
            padding: 24px;
        }

        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 36px 28px;
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.16);
            backdrop-filter: blur(20px);
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: -0.04em;
        }

        .brand p {
            margin: 10px auto 0;
            max-width: 290px;
            font-size: 0.96rem;
            color: #475569;
            line-height: 1.6;
        }

        .heading {
            margin-bottom: 28px;
        }

        .heading h2 {
            margin: 0;
            font-size: 1.75rem;
            line-height: 1.1;
        }

        .heading p {
            margin: 12px 0 0;
            font-size: 0.95rem;
            color: #64748B;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #0F172A;
        }

        .input-wrap {
            position: relative;
        }

        input {
            width: 100%;
            border: 1px solid #D2D6DC;
            border-radius: 16px;
            padding: 16px 48px 16px 44px;
            outline: none;
            font-size: 0.97rem;
            color: #0F172A;
            background: #F8FAFC;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }

        .input-wrap::before,
        .input-wrap::after {
            content: "";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #64748B;
            font-size: 1rem;
        }

        .input-wrap::before {
            left: 14px;
            content: "✉";
        }

        .password-wrap::before {
            content: "🔒";
            left: 14px;
        }

        .password-wrap::after {
            content: "👁";
            right: 14px;
            cursor: pointer;
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 14px 0 28px;
            gap: 12px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.92rem;
            color: #334155;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            accent-color: #2563EB;
            margin: 0;
        }

        .forgot {
            font-size: 0.93rem;
            color: #1D4ED8;
            text-decoration: none;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        .submit {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 16px;
            background: linear-gradient(90deg, #2563EB 0%, #1D4ED8 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 28px rgba(37, 99, 235, 0.24);
        }

        .demo-box {
            margin-top: 28px;
            padding: 18px 20px;
            border-radius: 18px;
            background: #F1F5F9;
            border: 1px solid #E2E8F0;
            color: #334155;
            font-size: 0.92rem;
        }

        .demo-box strong {
            display: block;
            margin-bottom: 8px;
            color: #0F172A;
        }

        .demo-box p {
            margin: 0;
            line-height: 1.7;
        }

        @media (max-width: 380px) {
            .card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <div class="brand">
                <h1>FleetSense</h1>
                <p>AI-Assisted Fleet Management for SME Trucking Operators</p>
            </div>
            <div class="heading">
                <h2>Welcome Back</h2>
                <p>Sign in to manage your fleet</p>
            </div>
            <form>
                <div class="field">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <input id="email" type="email" placeholder="roberto.cruz@cruztransport.ph" autocomplete="username">
                    </div>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <div class="input-wrap password-wrap">
                        <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password">
                    </div>
                </div>
                <div class="actions">
                    <label class="checkbox">
                        <input type="checkbox">
                        Remember me
                    </label>
                    <a class="forgot" href="#">Forgot Password?</a>
                </div>
                <button class="submit" type="submit">Sign In</button>
            </form>
            <div class="demo-box">
                <strong>Demo Credentials:</strong>
                <p>Email: demo@fleetsense.ph<br>Password: demo123</p>
            </div>
        </div>
    </div>
</body>
</html>
